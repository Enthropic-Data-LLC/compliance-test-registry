[pytest]
markers =
    assumption: Pattern 2 test — parameterized by a documented assumption
    determination: Pattern 3 test — requires a human determination on record
    pattern1: DETERMINISTIC direct assertion
    pattern2: PARAMETERIZED assertion with documented assumption
    pattern3: CONTESTED human-surfacing test
    framework_nerc_cip: NERC CIP tests
    framework_nerc_ops: NERC Reliability Standards (non-CIP) tests
    framework_nist_800_53: NIST SP 800-53 tests
    framework_nist_800_171: NIST SP 800-171 tests
    framework_nist_csf: NIST CSF 2.0 tests
    framework_nist_ai_rmf: NIST AI RMF tests
    framework_cmmc: CMMC 2.0 tests
    framework_fedramp: FedRAMP tests
    framework_iso27001: ISO/IEC 27001 tests
    framework_soc2: SOC 2 tests
    framework_pci: PCI DSS tests
    framework_hipaa: HIPAA Security Rule tests
    framework_hipaa_privacy: HIPAA Privacy Rule tests
    framework_gdpr: GDPR tests
    framework_osha: OSHA tests
    framework_nerc_cip: NERC CIP tests

addopts =
    --tb=short
    --strict-markers
    -v
