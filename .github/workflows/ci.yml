name: Registry Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC — catches stale assumptions even without code changes
  workflow_dispatch:

jobs:
  validate:
    name: Validate registry files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python and YAML blocks
        run: python tools/validate_registry.py

  staleness:
    name: Check assumption staleness
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for stale assumptions
        # Warn at 30 days; exit 2 (stale) blocks the pipeline
        run: |
          python tools/check_assumption_staleness.py --warn-days 30
          EXIT=$?
          if [ $EXIT -eq 2 ]; then
            echo "::error::One or more assumptions are past their review_due_date. See output above."
            exit 1
          fi
          exit 0
